<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>单词训练</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:"PingFang SC","Microsoft YaHei","Noto Sans SC",system-ui,sans-serif;background:#f2f5fc;min-height:100vh;padding:18px 14px 40px;display:flex;justify-content:center;color:#1a2639}
    .app{max-width:500px;width:100%}
    .card{background:#fff;border-radius:32px;padding:20px 18px;margin-bottom:16px;box-shadow:0 10px 30px rgba(0,20,40,0.06);border:1px solid rgba(255,255,255,0.5)}
    .card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
    .title{font-weight:700;font-size:22px;background:linear-gradient(145deg,#1e2b4f,#2d3f6e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .unit-badge{background:#eef3fe;border-radius:40px;padding:6px 16px;font-size:13px;font-weight:500;color:#2d4b8a;border:1px solid #d7e2fc}
    .filter-scroll{display:flex;gap:8px;overflow-x:auto;padding:4px 0 12px 0;scrollbar-width:none;-webkit-overflow-scrolling:touch;flex-wrap:nowrap}
    .filter-scroll::-webkit-scrollbar{display:none}
    .filter-btn{flex:0 0 auto;background:#f0f4fe;border:none;padding:8px 18px;border-radius:40px;font-size:14px;font-weight:500;color:#2b3f6b;cursor:pointer;border:1px solid transparent;transition:0.12s}
    .filter-btn.active{background:#1e3a7a;color:#fff;box-shadow:0 6px 14px rgba(30,58,122,0.18);border-color:#1e3a7a}
    .filter-btn:active{transform:scale(0.94)}
    .word-block{text-align:center;padding:20px 0 10px}
    .word-en{font-size:34px;font-weight:600;color:#0b1a33;cursor:pointer;display:inline-block;padding:6px 20px;border-radius:60px;transition:background .1s;user-select:none}
    .word-en:active{background:#eef3fc}
    .options-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:18px 0 8px}
    .option{background:#f6f9ff;padding:14px 6px;border-radius:20px;text-align:center;font-size:16px;font-weight:500;color:#1f2e4a;border:1.5px solid #eef3fc;cursor:pointer;transition:all .1s;word-break:break-word;line-height:1.3}
    .option:active{transform:scale(0.96);background:#e4ecfe}
    .option.correct{background:#c7f0d0;border-color:#34a85a;color:#0b4220}
    .option.wrong{background:#fcd4d4;border-color:#d14c4c;color:#6b1a1a}
    .option.disabled{pointer-events:none;opacity:0.7}
    .action-row{display:flex;gap:12px;margin-top:18px;flex-wrap:wrap}
    .btn{flex:1;background:#1e3a7a;border:none;padding:14px 10px;border-radius:40px;font-weight:600;font-size:16px;color:#fff;box-shadow:0 6px 14px rgba(30,58,122,0.15);cursor:pointer;transition:.12s;text-align:center;min-width:80px}
    .btn:active{transform:scale(0.95);background:#16315f}
    .btn-outline{background:transparent;color:#1e3a7a;box-shadow:none;border:1.5px solid #d0def0}
    .btn-outline:active{background:#eef3fc}
    .stats-grid{display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px 6px;font-size:15px;color:#2a3b5e;padding:6px 0}
    .stats-grid .num{font-weight:700;color:#0b1a33;margin-left:4px}
    .progress-wrap{background:#e9eff8;height:8px;border-radius:20px;margin:14px 0 6px;overflow:hidden}
    .progress-fill{height:100%;width:0%;background:linear-gradient(90deg,#3964d6,#6990f0);border-radius:20px;transition:width .25s}
    .weak-list{margin-top:12px;background:#f8faff;border-radius:24px;padding:12px 14px;border:1px solid #e3ecfc}
    .weak-title{font-weight:600;font-size:15px;display:flex;justify-content:space-between;color:#1d345c}
    .weak-items{display:flex;flex-wrap:wrap;gap:6px 10px;padding-top:8px;font-size:14px}
    .weak-tag{background:#eef3fe;padding:4px 14px;border-radius:30px;color:#1e3a7a}
    .weak-tag .badge{background:#d14c4c;color:#fff;border-radius:30px;padding:0 8px;margin-left:4px;font-size:11px}
    .footer-note{font-size:13px;color:#7789b0;text-align:center;margin-top:10px}
    .export-btn{background:#e9f0fc;border:none;padding:6px 16px;border-radius:40px;font-size:13px;font-weight:500;color:#1e3a7a;cursor:pointer;border:1px solid #d2e0f5}
    .export-btn:active{background:#d2e0f5}
    @media(max-width:460px){.options-grid{gap:8px}.option{font-size:15px;padding:12px 4px}.word-en{font-size:28px}.card{padding:16px 14px}}
  </style>
</head>
<body>
<div class="app" id="app">
  <div class="card">
    <div class="card-header">
      <span class="title">📘 单词训练</span>
      <span class="unit-badge" id="unitLabel">全部</span>
    </div>
    <div class="filter-scroll" id="filterContainer">
      <button class="filter-btn active" data-unit="all">📚 全部</button>
      <button class="filter-btn" data-unit="Unit 1 Love and Romance">❤️ Unit1</button>
      <button class="filter-btn" data-unit="Unit 2 Fasion">👗 Unit2</button>
      <button class="filter-btn" data-unit="Unit 3 Jobs & Careers">💼 Unit3</button>
      <button class="filter-btn" data-unit="Unit 4 Leadership">🧑‍💼 Unit4</button>
      <button class="filter-btn" data-unit="Unit 5 Technology and Life">📱 Unit5</button>
      <button class="filter-btn" data-unit="Unit 6 Information and Society">🌐 Unit6</button>
    </div>
  </div>
  <div class="card">
    <div class="word-block">
      <div class="word-en" id="wordDisplay">加载词库中...</div>
    </div>
    <div class="options-grid" id="optionsContainer"></div>
    <div class="action-row">
      <button class="btn" id="nextBtn">▶ 下一题</button>
      <button class="btn btn-outline" id="resetBtn">↺ 重置</button>
    </div>
    <div class="progress-wrap">
      <div class="progress-fill" id="progressBar"></div>
    </div>
  </div>
  <div class="card">
    <div class="stats-grid">
      <span>✅ 正确 <span class="num" id="correctCount">0</span></span>
      <span>❌ 错误 <span class="num" id="wrongCount">0</span></span>
      <span>🎯 准确率 <span class="num" id="rateDisplay">0%</span></span>
      <span>⭐ 积分 <span class="num" id="scoreDisplay">0</span></span>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px">
      <span style="font-size:14px;color:#2d4b8a;">📌 剩余 <span id="remainingDisplay">0</span> 词</span>
      <button class="export-btn" id="exportBtn">📤 导出薄弱表</button>
    </div>
  </div>
  <div class="card weak-list" id="weakListCard">
    <div class="weak-title">
      <span>📋 薄弱单词</span>
      <span style="font-weight:400;font-size:13px;color:#6783b0;">错误率越高越靠前 · 永久留存</span>
    </div>
    <div class="weak-items" id="weakItemsContainer">
      <span style="color:#97abcc;font-size:14px;">加载中...</span>
    </div>
  </div>
  <div class="footer-note">点击单词可发音 · 答对3次即"记住"</div>
</div>
<script>
(function(){
  // ===== 核心状态 =====
  var RAW_WORDS = [];
  var currentUnit = 'all';
  var filteredWords = [];
  var wordStatus = {};
  var currentWord = null;
  var lastWordEn = null;
  var correctCount = 0;
  var wrongCount = 0;
  var score = 0;
  var answered = false;
  var remainingSet = new Set();
  var isDataReady = false;

  // ===== DOM 引用 =====
  var wordDisplay = document.getElementById('wordDisplay');
  var optionsContainer = document.getElementById('optionsContainer');
  var correctSpan = document.getElementById('correctCount');
  var wrongSpan = document.getElementById('wrongCount');
  var rateSpan = document.getElementById('rateDisplay');
  var scoreSpan = document.getElementById('scoreDisplay');
  var remainingSpan = document.getElementById('remainingDisplay');
  var progressBar = document.getElementById('progressBar');
  var unitLabel = document.getElementById('unitLabel');
  var weakContainer = document.getElementById('weakItemsContainer');
  var nextBtn = document.getElementById('nextBtn');
  var resetBtn = document.getElementById('resetBtn');
  var exportBtn = document.getElementById('exportBtn');
  var synth = window.speechSynthesis;

  // ===== 加载CSV =====
  function loadCSV() {
    fetch('vocabulary.csv')
      .then(response => {
        if (!response.ok) throw new Error('CSV文件加载失败，状态码: ' + response.status);
        return response.text();
      })
      .then(csvText => {
        parseCSV(csvText);
        isDataReady = true;
        updateFilteredWords();
      })
      .catch(error => {
        console.error('加载词库出错:', error);
        wordDisplay.textContent = '⚠️ 词库加载失败';
        weakContainer.innerHTML = '<span style="color:#d14c4c;">请检查网络或刷新重试</span>';
        useFallbackWords();
        isDataReady = true;
        updateFilteredWords();
      });
  }

  function parseCSV(csvText) {
    var lines = csvText.split('\n');
    if (lines.length < 2) return;
    for (var i = 1; i < lines.length; i++) {
      var line = lines[i].trim();
      if (line === '') continue;
      var parts = line.match(/(".*?"|[^,]+)(?=\s*,|\s*$)/g);
      if (parts && parts.length >= 3) {
        var unit = parts[0].replace(/^"|"$/g, '').trim();
        var en = parts[1].replace(/^"|"$/g, '').trim();
        var cn = parts[2].replace(/^"|"$/g, '').trim();
        if (en && cn) {
          RAW_WORDS.push({ unit: unit, en: en, cn: cn });
        }
      }
    }
    console.log('✅ 从CSV加载了 ' + RAW_WORDS.length + ' 个单词');
  }

  function useFallbackWords() {
    RAW_WORDS = [
      {unit:"Unit 1", en:"spontaneous", cn:"自发的"},
      {unit:"Unit 1", en:"prevailing", cn:"普遍的"},
      {unit:"Unit 1", en:"swoon", cn:"痴迷"},
      {unit:"Unit 2", en:"occupational", cn:"职业的"},
      {unit:"Unit 2", en:"apparent", cn:"显而易见"}
    ];
    console.warn('⚠️ 使用备用词库，仅 ' + RAW_WORDS.length + ' 个词');
  }

  // ===== 核心逻辑 =====
  function updateFilteredWords() {
    if (!isDataReady) return;
    if (currentUnit === 'all') {
      filteredWords = RAW_WORDS.slice();
    } else {
      filteredWords = RAW_WORDS.filter(function(w) { return w.unit === currentUnit; });
    }
    filteredWords.forEach(function(w) {
      if (!wordStatus[w.en]) {
        wordStatus[w.en] = { correct: 0, wrong: 0, en: w.en, cn: w.cn, unit: w.unit };
      }
    });
    remainingSet = new Set();
    filteredWords.forEach(function(w, idx) {
      if (wordStatus[w.en].correct < 3) {
        remainingSet.add(idx);
      }
    });
    unitLabel.textContent = currentUnit === 'all' ? '全部' : currentUnit.replace('Unit ', 'U');
    lastWordEn = null;
    updateUI();
    if (filteredWords.length > 0 && remainingSet.size > 0) {
      loadNewWord();
    } else if (filteredWords.length > 0 && remainingSet.size === 0) {
      wordDisplay.textContent = '🎉 全部记住！';
      optionsContainer.innerHTML = '';
      answered = true;
    } else {
      wordDisplay.textContent = '无单词';
      optionsContainer.innerHTML = '';
    }
  }

  function updateUI() {
    var total = filteredWords.length || 1;
    var done = total - remainingSet.size;
    var pct = Math.round((done / total) * 100);
    progressBar.style.width = Math.min(pct, 100) + '%';
    correctSpan.textContent = correctCount;
    wrongSpan.textContent = wrongCount;
    var all = correctCount + wrongCount;
    rateSpan.textContent = all ? Math.round((correctCount / all) * 100) + '%' : '0%';
    scoreSpan.textContent = score;
    remainingSpan.textContent = remainingSet.size;
    updateWeakList();
  }

  // ===== 薄弱列表：永久保留所有有错误记录的词 =====
  function updateWeakList() {
    var list = [];
    var unitSet = new Set(filteredWords.map(function(w) { return w.en; }));
    for (var en in wordStatus) {
      if (!unitSet.has(en)) continue;
      var st = wordStatus[en];
      var total = st.correct + st.wrong;
      // 只要有过错误记录（wrong > 0）就显示，永久留存
      if (st.wrong > 0) {
        var rate = st.wrong / total;
        list.push({ en: st.en, cn: st.cn, rate: rate, wrong: st.wrong, total: total });
      }
    }
    list.sort(function(a, b) { return b.rate - a.rate; });
    if (list.length === 0) {
      weakContainer.innerHTML = '<span style="color:#97abcc;font-size:14px;">🎉 没有错误记录，继续加油！</span>';
      return;
    }
    var html = '';
    list.forEach(function(item) {
      var pct = Math.round(item.rate * 100);
      var status = item.total > 0 && item.wrong === 0 ? '✅' : '';
      html += '<span class="weak-tag">' + item.en + ' <span class="badge">' + pct + '%</span></span>';
    });
    weakContainer.innerHTML = html;
  }

  // ===== 避免连续出现 =====
  function loadNewWord() {
    if (!isDataReady) return;
    if (remainingSet.size === 0) {
      wordDisplay.textContent = '🎉 全部记住！';
      optionsContainer.innerHTML = '';
      answered = true;
      lastWordEn = null;
      return;
    }
    var remainingIndices = Array.from(remainingSet);
    var candidateIndices = remainingIndices;
    if (remainingIndices.length >= 2 && lastWordEn !== null) {
      candidateIndices = remainingIndices.filter(function(idx) {
        return filteredWords[idx].en !== lastWordEn;
      });
      if (candidateIndices.length === 0) {
        candidateIndices = remainingIndices;
      }
    }
    var randIdx = candidateIndices[Math.floor(Math.random() * candidateIndices.length)];
    var word = filteredWords[randIdx];
    currentWord = { index: randIdx, en: word.en, cn: word.cn, unit: word.unit };
    lastWordEn = word.en;
    wordDisplay.textContent = word.en;
    generateOptions(word.cn);
    answered = false;
  }

  function generateOptions(correctCn) {
    var candidates = [];
    var cnSet = new Set();
    cnSet.add(correctCn);
    candidates.push(correctCn);
    var pool = filteredWords.map(function(w) { return w.cn; });
    var shuffled = pool.slice().sort(function() { return Math.random() - 0.5; });
    for (var i = 0; i < shuffled.length && candidates.length < 4; i++) {
      if (!cnSet.has(shuffled[i])) {
        cnSet.add(shuffled[i]);
        candidates.push(shuffled[i]);
      }
    }
    while (candidates.length < 4) {
      var fallback = ['正确选项', '干扰项A', '干扰项B', '干扰项C'];
      if (!cnSet.has(fallback[candidates.length])) {
        candidates.push(fallback[candidates.length]);
      }
    }
    var shuffledOptions = candidates.sort(function() { return Math.random() - 0.5; });
    var html = '';
    for (var i = 0; i < shuffledOptions.length; i++) {
      html += '<div class="option" data-cn="' + shuffledOptions[i] + '">' + shuffledOptions[i] + '</div>';
    }
    optionsContainer.innerHTML = html;
    var opts = document.querySelectorAll('.option');
    for (var j = 0; j < opts.length; j++) {
      opts[j].addEventListener('click', function(e) {
        if (answered) return;
        var selected = e.target.getAttribute('data-cn');
        handleAnswer(selected);
      });
    }
  }

  function handleAnswer(selected) {
    answered = true;
    var st = wordStatus[currentWord.en];
    var opts = document.querySelectorAll('.option');
    var isCorrect = (selected === currentWord.cn);
    if (isCorrect) {
      st.correct++;
      correctCount++;
      score += 10;
      if (st.correct >= 3) {
        remainingSet.delete(currentWord.index);
      }
    } else {
      st.wrong++;
      wrongCount++;
      score = Math.max(0, score - 5);
    }
    for (var i = 0; i < opts.length; i++) {
      opts[i].classList.add('disabled');
      if (opts[i].getAttribute('data-cn') === currentWord.cn) {
        opts[i].classList.add('correct');
      } else if (opts[i].getAttribute('data-cn') === selected && !isCorrect) {
        opts[i].classList.add('wrong');
      }
    }
    updateUI();
  }

  // ===== 重置 =====
  function resetStats() {
    if (confirm('重置所有进度？这将清除所有统计数据。')) {
      correctCount = 0;
      wrongCount = 0;
      score = 0;
      wordStatus = {};
      lastWordEn = null;
      updateFilteredWords();
    }
  }

  // ===== TTS =====
  function speakWord() {
    if (!currentWord) return;
    if (synth.speaking) synth.cancel();
    var utterance = new SpeechSynthesisUtterance(currentWord.en);
    utterance.lang = 'en-US';
    utterance.rate = 0.9;
    synth.speak(utterance);
  }

  // ===== 导出薄弱表 =====
  function exportWeakList() {
    var list = [];
    var unitSet = new Set(filteredWords.map(function(w) { return w.en; }));
    for (var en in wordStatus) {
      if (!unitSet.has(en)) continue;
      var st = wordStatus[en];
      var total = st.correct + st.wrong;
      if (st.wrong > 0) {
        var rate = st.wrong / total;
        list.push({ en: st.en, cn: st.cn, correct: st.correct, wrong: st.wrong, rate: rate });
      }
    }
    if (list.length === 0) {
      alert('🎉 没有错误记录，无需导出！');
      return;
    }
    list.sort(function(a, b) { return b.rate - a.rate; });
    var header = '单词,中文,正确次数,错误次数,错误率\n';
    var body = '';
    list.forEach(function(item) {
      var pct = Math.round(item.rate * 100);
      body += item.en + ',' + item.cn + ',' + item.correct + ',' + item.wrong + ',' + pct + '%\n';
    });
    var blob = new Blob([header + body], { type: 'text/csv;charset=utf-8;' });
    var link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = '薄弱单词表.csv';
    link.click();
  }

  // ===== 切换单元 =====
  function switchUnit(unit) {
    currentUnit = unit;
    document.querySelectorAll('.filter-btn').forEach(function(btn) {
      btn.classList.toggle('active', btn.getAttribute('data-unit') === unit);
    });
    lastWordEn = null;
    updateFilteredWords();
  }

  // ===== 事件绑定 =====
  document.querySelectorAll('.filter-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      switchUnit(this.getAttribute('data-unit'));
    });
  });
  wordDisplay.addEventListener('click', speakWord);
  nextBtn.addEventListener('click', function() {
    if (!isDataReady) return;
    if (!answered && currentWord) {
      var st = wordStatus[currentWord.en];
      if (st && st.correct < 3) {
        if (confirm('当前题目未作答，确定跳过吗？')) { loadNewWord(); }
      } else { loadNewWord(); }
    } else { loadNewWord(); }
  });
  resetBtn.addEventListener('click', resetStats);
  exportBtn.addEventListener('click', exportWeakList);

  // ===== 启动应用 =====
  loadCSV();
})();
</script>
</body>
</html>
