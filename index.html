<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>单词训练系统 PRO</title>

<style>
/* ✅ 已修复：使用系统安全字体（GitHub Pages 推荐） */
body {
    margin: 0;
    font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
    background: #f4f6f9;
}

/* 容器适配手机 */
.container {
    max-width: 520px;
    margin: auto;
    padding: 12px;
}

/* 卡片UI */
.card {
    background: #fff;
    border-radius: 18px;
    padding: 14px;
    margin-bottom: 12px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

/* 标题 */
.title {
    text-align: center;
    font-size: 20px;
    font-weight: bold;
}

/* 单词 */
.word {
    font-size: 30px;
    text-align: center;
    margin: 15px 0;
}

/* 选项按钮 */
.option {
    background: #f1f3f7;
    padding: 12px;
    border-radius: 12px;
    margin: 8px 0;
    text-align: center;
    font-size: 16px;
    cursor: pointer;
}

.option:active {
    transform: scale(0.98);
}

/* 按钮 */
.btn {
    background: #4c7dff;
    color: white;
    text-align: center;
    padding: 12px;
    border-radius: 12px;
    margin-top: 10px;
    cursor: pointer;
}

/* 小字 */
.small {
    font-size: 12px;
    color: #666;
    text-align: center;
}

/* 进度条 */
.progress {
    height: 10px;
    background: #eee;
    border-radius: 10px;
    overflow: hidden;
}

.bar {
    height: 100%;
    width: 0%;
    background: #4c7dff;
}
</style>
</head>

<body>

<div class="container">

    <div class="card">
        <div class="title">📘 单词训练系统 PRO</div>
        <div class="small">GitHub Pages 兼容版（已修复字体问题）</div>
    </div>

    <div class="card">
        <div class="word" id="word">点击开始</div>
        <div id="options"></div>
        <div class="btn" onclick="next()">下一题</div>
    </div>

    <div class="card">
        <div>✔ 正确：<span id="ok">0</span> | ❌ 错误：<span id="bad">0</span></div>
        <div>准确率：<span id="rate">0%</span></div>
    </div>

</div>

<script>
// ===== 示例词库（你可替换成完整198词）=====
const WORDS = [
    {en:"apple", cn:"苹果"},
    {en:"book", cn:"书"},
    {en:"cat", cn:"猫"},
    {en:"dog", cn:"狗"}
];

let current;
let correct = 0;
let wrong = 0;

function pick(){
    return WORDS[Math.floor(Math.random()*WORDS.length)];
}

function next(){
    current = pick();

    let options = WORDS
        .sort(()=>Math.random()-0.5)
        .slice(0,3)
        .map(w=>w.cn);

    if(!options.includes(current.cn)){
        options[Math.floor(Math.random()*3)] = current.cn;
    }

    document.getElementById("word").innerText = current.en;

    document.getElementById("options").innerHTML =
        options.map(o=>`
            <div class='option' onclick='answer("${o}")'>${o}</div>
        `).join("");
}

function answer(opt){
    if(opt === current.cn){
        correct++;
    } else {
        wrong++;
    }

    update();
}

function update(){
    let total = correct + wrong;
    document.getElementById("ok").innerText = correct;
    document.getElementById("bad").innerText = wrong;
    document.getElementById("rate").innerText =
        total ? Math.round(correct/total*100) + "%" : "0%";
}
</script>

</body>
</html>
